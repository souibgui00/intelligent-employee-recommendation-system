name: CI & Deploy

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Backend - install & test
        working-directory: backend
        run: |
          npm install --legacy-peer-deps
          npm test -- --coverage --ci

      - name: Backend - upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./backend/coverage/lcov.info
          flags: backend
          name: backend-coverage

      - name: Backend - upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: backend/coverage/

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Frontend - install dependencies
        working-directory: frontend
        run: |
          npm ci --prefer-offline --no-audit --no-fund

      - name: Frontend - run tests
        working-directory: frontend
        run: |
          npm test -- --coverage --watchAll=false

      - name: Frontend - upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./frontend/coverage/lcov.info
          flags: frontend
          name: frontend-coverage

      - name: Frontend - upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-test-results
          path: frontend/coverage/

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.23.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run npm audit
        run: |
          cd backend && npm audit --audit-level high || true
          cd frontend && npm audit --audit-level high || true

  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v2
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Quality Gate Check
        run: |
          echo "🔍 Checking quality metrics..."
          # Wait for SonarQube analysis to complete
          sleep 30
          
          # Check coverage threshold
          BACKEND_COVERAGE=$(cat backend/coverage/lcov.info | grep -o 'lines.*:' | tail -1 | grep -o '[0-9]*' | head -1)
          FRONTEND_COVERAGE=$(cat frontend/coverage/lcov.info | grep -o 'lines.*:' | tail -1 | grep -o '[0-9]*' | head -1)
          
          echo "Backend Coverage: ${BACKEND_COVERAGE}%"
          echo "Frontend Coverage: ${FRONTEND_COVERAGE}%"
          
          if [ "$BACKEND_COVERAGE" -lt 80 ] || [ "$FRONTEND_COVERAGE" -lt 80 ]; then
            echo "❌ Coverage below 80%"
            exit 1
          else
            echo "✅ Coverage meets requirements"
          fi

  deploy-staging:
    name: Deploy to Staging
    needs: [test-backend, test-frontend, security-scan, sonarqube]
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Staging
        run: |
          vercel --token=${{ secrets.SKILLHR }} --scope ${{ secrets.VERCEL_ORG_ID }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Health Check
        run: |
          sleep 30
          if ! curl -f https://staging.yourapp.com/health; then
            echo "❌ Staging health check failed"
            exit 1
          else
            echo "✅ Staging deployment successful"
          fi

  deploy-production:
    name: Deploy to Production
    needs: [test-backend, test-frontend, security-scan, sonarqube]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Build via Vercel
        run: vercel build --prod --token=${{ secrets.SKILLHR }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.SKILLHR }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Health Check
        run: |
          sleep 30
          if ! curl -f https://yourapp.com/health; then
            echo "❌ Production health check failed, rolling back..."
            vercel --token=${{ secrets.SKILLHR }} rollback
            exit 1
          else
            echo "✅ Production deployment successful"
          fi

  notify:
    name: Notify Results
    needs: [test-backend, test-frontend, security-scan, sonarqube, deploy-staging, deploy-production]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Notify on Success
        if: success()
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data '{"text":"✅ CI/CD Pipeline Successful for ${{ github.repository }} - Commit: ${{ github.sha }}"}' \
            ${{ secrets.SLACK_WEBHOOK }} || echo "Slack notification failed"

      - name: Notify on Failure
        if: failure()
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data '{"text":"❌ CI/CD Pipeline Failed for ${{ github.repository }} - Commit: ${{ github.sha }}"}' \
            ${{ secrets.SLACK_WEBHOOK }} || echo "Slack notification failed"
