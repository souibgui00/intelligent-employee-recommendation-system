name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Setup Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '20'

      - name: Backend - install & test
        run: |
          cd backend
          npm ci
          npm test

      - name: Install Frontend
  run: |
    cd "frontend"
    npm ci

- name: Build
  run: |
    cd "frontend"
    npm run build

- name: Run frontend tests
  run: |
    cd "frontend"
    npm test
