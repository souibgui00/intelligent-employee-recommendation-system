name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Setup Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '14'

      - name: Install dependencies
        run: |
          cd backend
          npm run test

      - name: Install Frontend
        run: |
          cd "hr-activity-recommender (3)"
          npm install

      - name: Build
        run: |
          cd "hr-activity-recommender (3)"
          npm run build

      - name: Run tests
        run: |
          cd "hr-activity-recommender (3)"
          npm test
