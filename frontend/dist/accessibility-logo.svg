<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer circle -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="black" stroke-width="8"/>
  <!-- Inner circle -->
  <circle cx="50" cy="50" r="40" fill="black"/>
  <!-- Head -->
  <circle cx="50" cy="25" r="8" fill="white"/>
  <!-- Body -->
  <rect x="46" y="35" width="8" height="20" fill="white" rx="4"/>
  <!-- Left arm -->
  <rect x="30" y="40" width="20" height="6" fill="white" rx="3" transform="rotate(-20 40 43)"/>
  <!-- Right arm -->
  <rect x="50" y="40" width="20" height="6" fill="white" rx="3" transform="rotate(20 60 43)"/>
  <!-- Left leg -->
  <rect x="44" y="56" width="5" height="18" fill="white" rx="2.5"/>
  <!-- Right leg -->
  <rect x="51" y="56" width="5" height="18" fill="white" rx="2.5"/>
</svg>