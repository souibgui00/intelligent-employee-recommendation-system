# SonarQube Project Configuration
sonar.projectKey=backend
sonar.projectName=Employee Recommendation Backend
sonar.host.url=http://localhost:9000

# Source Configuration
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.spec.ts,**/*.test.ts
sonar.test.exclusions=**/node_modules/**,**/dist/**,**/coverage/**

# Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/uploads/**,**/*.json,**/*.md,**/*.yml,**/*.yaml,**/*.lock,**/scripts/**,**/*.config.js,**/*.spec.ts,**/*.test.ts

# Coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=**/*.spec.ts,**/*.test.ts,**/*.module.ts,**/main.ts

# Quality Gate
sonar.qualitygate.wait=false